name: Sandbox Registration Flow

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sandbox-registration:
    name: Controlled sandbox registration
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Disable Git line-ending conversion
        shell: powershell
        run: git config --global core.autocrlf false

      - name: Checkout
        uses: actions/checkout@v4

      - name: Preserve repository line endings
        shell: powershell
        run: |
          git config core.autocrlf false
          git reset --hard HEAD

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m playwright install chromium

      - name: Run controlled registration
        shell: powershell
        run: python .\sandbox_registration_flow.py

      - name: Summarize sandbox artifacts
        if: always()
        shell: powershell
        run: |
          if (Test-Path .\Results\sandbox_registration) {
            Get-ChildItem .\Results\sandbox_registration -Recurse -File |
              Sort-Object LastWriteTime -Descending |
              Select-Object -First 30 FullName,Length,LastWriteTime |
              Format-Table -AutoSize
          } else {
            Write-Host "No sandbox registration artifacts produced"
          }

      - name: Upload sandbox artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sandbox-registration-results
          path: Results/sandbox_registration/**
          if-no-files-found: error
