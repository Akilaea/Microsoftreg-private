name: Registration Flow

on:
  workflow_dispatch:
    inputs:
      proxy_url:
        description: "Proxy URL, secret_or_direct, or direct/off/none to disable proxy"
        required: false
        default: "secret_or_direct"
      wall_ms:
        description: "Visible hold wall time in milliseconds"
        required: false
        default: "5000"
      timeout_minutes:
        description: "Timeout for the live registration step"
        required: false
        default: "10"
      headless:
        description: "Run browser headless: true or false"
        required: false
        default: "false"
      preverify_min_total_ms:
        description: "Minimum total flow age before pre-captcha risk/verify"
        required: false
        default: "12000"
      thin_bootstrap_wait_ms:
        description: "Thin bootstrap wait budget in milliseconds"
        required: false
        default: "12000"
      input_mode:
        description: "Hold input mode: hybrid_cdp, hybrid_legacy_up, legacy_page, cdp_dense, cdp_sparse, native_sendinput, native_sendinput_sparse, hybrid_page_forclick, hybrid_async_release, or oopif_cdp"
        required: false
        default: "hybrid_cdp"

permissions:
  contents: read

jobs:
  live-registration:
    name: Live registration smoke
    runs-on: windows-latest
    timeout-minutes: 20
    env:
      PYTHONIOENCODING: utf-8
      LIVE_PROXY_URL: ${{ secrets.LIVE_PROXY_URL }}

    steps:
      - name: Disable Git line-ending conversion
        shell: powershell
        run: git config --global core.autocrlf false

      - name: Checkout
        uses: actions/checkout@v4

      - name: Preserve repository line endings
        shell: powershell
        run: |
          git config core.autocrlf false
          git reset --hard HEAD

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python and browser dependencies
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m playwright install chromium
          python -m patchright install chromium

      - name: Prepare GitHub Actions runtime config
        shell: powershell
        run: |
          $proxyInput = "${{ inputs.proxy_url }}"
          $secretProxy = $env:LIVE_PROXY_URL
          if ([string]::IsNullOrWhiteSpace($proxyInput)) { $proxyInput = "secret_or_direct" }
          if ($proxyInput -in @("secret", "secret_or_direct")) {
            if ([string]::IsNullOrWhiteSpace($secretProxy)) {
              throw "LIVE_PROXY_URL secret is empty while proxy_url=$proxyInput. Configure the repository secret or explicitly dispatch with proxy_url=direct/off/none for a deliberate direct test."
            }
            $proxy = $secretProxy
          } else {
            $proxy = $proxyInput
          }
          if ($proxy -notin @("direct", "off", "none", "disabled", "__none__")) {
            Write-Host "::add-mask::$proxy"
          }
          $headlessText = "${{ inputs.headless }}"
          $headless = $headlessText -match '^(?i:true|1|yes|on)$'
          if ($headless) {
            "OUTLOOK_REGISTER_HEADLESS=1" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          } else {
            "OUTLOOK_REGISTER_HEADLESS=0" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          }
          "OUTLOOK_SIGNUP_PROTOCOL_TAKEOVER_PREVERIFY_TRANSPORT=page_fetch" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "OUTLOOK_SIGNUP_PROTOCOL_TAKEOVER_PREVERIFY_MIN_TOTAL_MS=${{ inputs.preverify_min_total_ms }}" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "OUTLOOK_SIGNUP_PROTOCOL_TAKEOVER_THIN_BOOTSTRAP_WAIT_MS=${{ inputs.thin_bootstrap_wait_ms }}" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "OUTLOOK_SIGNUP_PROTOCOL_TAKEOVER_THIN_GOTO_WAIT_UNTIL=commit" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

          $browserCandidates = @(
            "$env:ProgramFiles\Google\Chrome\Application\chrome.exe",
            "${env:ProgramFiles(x86)}\Google\Chrome\Application\chrome.exe",
            "$env:LOCALAPPDATA\ms-playwright\chromium-*\chrome-win\chrome.exe"
          )
          $browserPath = ""
          foreach ($candidate in $browserCandidates) {
            $match = Get-ChildItem -Path $candidate -ErrorAction SilentlyContinue |
              Sort-Object LastWriteTime -Descending |
              Select-Object -First 1
            if ($match) {
              $browserPath = $match.FullName
              break
            }
          }
          if (-not $browserPath) {
            throw "No Chromium/Chrome executable found after browser install"
          }

          $cfg = Get-Content -LiteralPath .\config.ctf.runtime.protocol1s-adssafe-stab-5-20260705_033428.manual.20260705_033428.json -Raw |
            ConvertFrom-Json
          if ($proxy -in @("direct", "off", "none", "disabled", "__none__")) {
            $cfg.proxy = ""
          } else {
            $cfg.proxy = $proxy
          }
          $cfg.patchright.browser_path = $browserPath
          $cfg.patchright.user_data_dir = ".\profiles\github-actions-live"
          $cfg.patchright.use_cloakbrowser = $false
          $cfg.patchright | Add-Member -NotePropertyName headless -NotePropertyValue $headless -Force
          $inputModeForConfig = "${{ inputs.input_mode }}"
          if ($inputModeForConfig -in @("hybrid_async_release", "oopif_cdp")) {
            $cfg.patchright | Add-Member -NotePropertyName args -NotePropertyValue @("--remote-debugging-port=9222") -Force
          } elseif ($cfg.patchright.PSObject.Properties.Name -contains "args") {
            $cfg.patchright.PSObject.Properties.Remove("args")
          }
          $cfg.playwright.browser_path = $browserPath
          $cfg.playwright.user_data_dir = ".\profiles\github-actions-live"
          $cfg.cloakbrowser.headless = $headless

          $json = $cfg | ConvertTo-Json -Depth 100
          [System.IO.File]::WriteAllText(
            (Resolve-Path .).Path + "\config.ctf.runtime.github-actions-live.json",
            $json,
            [System.Text.UTF8Encoding]::new($false)
          )
          Write-Host "GITHUB_ACTIONS_LIVE_CONFIG_OK browser=$browserPath proxy=$($cfg.proxy) headless=$headless preverify_min_total_ms=${{ inputs.preverify_min_total_ms }} thin_wait_ms=${{ inputs.thin_bootstrap_wait_ms }}"

      - name: Run full live registration flow
        shell: powershell
        timeout-minutes: ${{ fromJSON(inputs.timeout_minutes) }}
        run: |
          $proxyInput = "${{ inputs.proxy_url }}"
          $secretProxy = $env:LIVE_PROXY_URL
          if ([string]::IsNullOrWhiteSpace($proxyInput)) { $proxyInput = "secret_or_direct" }
          if ($proxyInput -in @("secret", "secret_or_direct")) {
            if ([string]::IsNullOrWhiteSpace($secretProxy)) {
              throw "LIVE_PROXY_URL secret is empty while proxy_url=$proxyInput. Configure the repository secret or explicitly dispatch with proxy_url=direct/off/none for a deliberate direct test."
            }
            $proxy = $secretProxy
          } else {
            $proxy = $proxyInput
          }
          $inputMode = "${{ inputs.input_mode }}"
          if ([string]::IsNullOrWhiteSpace($inputMode)) { $inputMode = "hybrid_cdp" }
          $inputArgs = @()
          switch ($inputMode) {
            "hybrid_cdp" {
              $inputArgs += "-HybridLegacyDownCdpMoveUp"
              $inputArgs += @("-LegacyShortHoldSteps", "24")
            }
            "hybrid_legacy_up" {
              $inputArgs += "-HybridLegacyDownCdpMoveLegacyUp"
              $inputArgs += @("-LegacyShortHoldSteps", "24")
            }
            "legacy_page" {
              $inputArgs += "-LegacyShortHoldInput"
              $inputArgs += "-NoDenseCdpHoldInput"
              $inputArgs += @("-LegacyShortHoldSteps", "24")
            }
            "cdp_dense" { }
            "cdp_sparse" {
              $inputArgs += "-NoDenseCdpHoldInput"
            }
            "native_sendinput" {
              $inputArgs += "-NativeSendInputHoldInput"
            }
            "native_sendinput_sparse" {
              $inputArgs += "-NativeSendInputHoldInput"
              $inputArgs += "-NoDenseCdpHoldInput"
            }
            "hybrid_page_forclick" {
              $inputArgs += "-HybridLegacyDownCdpMoveUp"
              $inputArgs += @("-HybridPageMoveCount", "2")
              $inputArgs += "-HybridPageMoveForClick"
              $inputArgs += @("-LegacyShortHoldSteps", "24")
            }
            "hybrid_async_release" {
              $inputArgs += "-HybridLegacyDownCdpMoveUp"
              $inputArgs += @("-HybridPageMoveCount", "2")
              $inputArgs += "-HybridPageMoveNoReply"
              $inputArgs += @("-AsyncRawCdpReleaseMs", "${{ inputs.wall_ms }}")
              $inputArgs += "-AsyncRawCdpReleaseNoWait"
              $inputArgs += @("-RawCdpEndpoint", "http://127.0.0.1:9222")
              $inputArgs += @("-LegacyShortHoldSteps", "24")
            }
            "oopif_cdp" {
              $inputArgs += "-OopifCdpHoldInput"
              $inputArgs += "-OopifCdpNoWait"
              $inputArgs += @("-RawCdpEndpoint", "http://127.0.0.1:9222")
            }
            default {
              throw "Unsupported input_mode=$inputMode"
            }
          }
          Write-Host "LIVE_INPUT_MODE=$inputMode args=$($inputArgs -join ' ')"
          powershell -NoProfile -ExecutionPolicy Bypass -File .\run_1s_protocol_restart_once.ps1 `
            -Config .\config.ctf.runtime.github-actions-live.json `
            -ProxyUrl $proxy `
            -NoCloakBrowser `
            -WallMs ${{ inputs.wall_ms }} `
            -HoldMs 13000 `
            -StopDelayMs 900 `
            -PreDownDwellMs 900 `
            -FinalProofNormalizer ads_safe `
            -W0Policy after160 `
            -NoSyntheticU0 `
            @inputArgs `
            -RequireChctxRuntimeReady `
            -MinRuntimeHookReadyFrames 6 `
            -MinKnpPrestartOk 5 `
            -PreholdHookGuardRetries 2 `
            -PreholdReadinessGateMs 1800 `
            -RealTargetWaitMs 20000 `
            -RetryAfterMs 7000 `
            -SignupEntryMode msal_authorize `
            -SignupFillMode protocol_takeover_thin `
            -W0ResponseMode real_final_neutral_w0_success `
            -W0ResponseWaitMs 3500 `
            -DelayCaptchaCloseMs 8000 `
            -CaptchaCloseGraceMs 3000 `
            -RiskVerifyGateMs 1450 `
            -RiskVerifyGateTimeoutMs 9000 `
            -RiskVerifyHumanSuccessAgeMs 650 `
            -RiskVerifyHumanSuccessTimeoutMs 3000 `
            -PreserveFinalBfa

      - name: Summarize live artifacts
        if: always()
        shell: powershell
        run: |
          if (Test-Path .\config.ctf.runtime.github-actions-live.json) {
            $cfg = Get-Content -LiteralPath .\config.ctf.runtime.github-actions-live.json -Raw | ConvertFrom-Json
            $proxyMode = if ([string]::IsNullOrWhiteSpace($cfg.proxy)) { "direct" } else { "configured" }
            Write-Host "LIVE_CONFIG_PROXY_MODE=$proxyMode"
          }
          $latestProbe = Get-ChildItem .\Results\protocol_runtime\*live_probe.log -ErrorAction SilentlyContinue |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          if ($latestProbe) {
            Write-Host "LATEST_PROBE_LOG=$($latestProbe.FullName)"
            Select-String -LiteralPath $latestProbe.FullName -Pattern "riskblock|risk/verify|CreateAccount|outlook_register result|Success: Email Registration" |
              Select-Object -Last 40 |
              ForEach-Object { Write-Host "LIVE_SIGNAL $($_.Line)" }
          }
          $latestScreenshot = Get-ChildItem .\Results -Recurse -File -Include *.png -ErrorAction SilentlyContinue |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          if ($latestScreenshot) {
            Write-Host "LATEST_SCREENSHOT=$($latestScreenshot.FullName)"
          }
          if (Test-Path .\Results) {
            Get-ChildItem .\Results -Recurse -File |
              Sort-Object LastWriteTime -Descending |
              Select-Object -First 80 |
              ForEach-Object {
                Write-Host ("ARTIFACT {0} bytes {1:o} {2}" -f $_.Length, $_.LastWriteTime, $_.FullName)
              }
          } else {
            Write-Host "No Results directory produced"
          }

      - name: Upload live artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-registration-results
          path: |
            Results/**
            config.ctf.runtime.github-actions-live.json
          if-no-files-found: ignore
